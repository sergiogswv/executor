# ─── Ejecutor — Configuración de Servicios (MULTIPLATAFORMA) ───────────────────
#
# Cada entrada define un "servicio" que el Ejecutor sabe levantar.
# El Cerebro solo necesita mandar el nombre del servicio (ej: "warden").
# El Ejecutor busca aquí el comando, directorio y variables de entorno.
#
# Campos:
#   name:     Nombre legible del servicio
#   command:  Comando a ejecutar (string o lista de args)
#   cwd:      Directorio de trabajo (RELATIVO al ejecutor o absoluto)
#   env:      Variables de entorno adicionales (opcional)
#   port:     Puerto del servicio (solo informativo, para health checks futuros)
#   shell:    Si ejecutar dentro de un shell (default: false)
#
# NOTA: Las rutas relativas se resuelven desde el directorio del ejecutor.
#       Usa "/" como separador (Python lo convierte automáticamente en Windows)

services:

  cerebro:
    name: "Cerebro — Orquestador"
    command: "python -m uvicorn app.main:app --host 0.0.0.0 --port 4000"
    cwd: "../cerebro"
    port: 4000
    shell: true
    env:
      ORCHESTRATOR_MODE: "rest"
      LOG_LEVEL: "INFO"
      VIRTUAL_ENV: "../cerebro/.venv"
      PATH: "../cerebro/.venv/Scripts"
      PYTHONIOENCODING: "utf-8"

  warden:
    name: "Warden — Agente de Seguridad"
    command: "target/release/warden serve"
    cwd: "../warden"
    port: 4003
    shell: true
    env:
      CEREBRO_URL: "http://127.0.0.1:4000"
      CEREBRO_REPORT_ENABLED: "true"
      WARDEN_PORT: "4003"

  warden_adk:
    name: "Warden ADK — Sidecar IA"
    command: "python -m uvicorn warden_agent.main:app --host 0.0.0.0 --port 4013"
    cwd: "../warden"
    port: 4013
    shell: true
    env:
      CEREBRO_URL: "http://127.0.0.1:4000"
      VIRTUAL_ENV: "../warden/.venv"
      PATH: "../warden/.venv/Scripts"
      PYTHONIOENCODING: "utf-8"

  sentinel:
    name: "Sentinel — Agente de Monitoreo"
    command: "target/release/sentinel serve"
    cwd: "../sentinel"
    port: 4001
    shell: true
    env:
      CEREBRO_URL: "http://127.0.0.1:4000"
      SENTINEL_PORT: "4001"
      CEREBRO_REPORT_ENABLED: "true"

  architect:
    name: "Architect Linter — Agente de Calidad"
    command: "target/release/architect-linter-pro serve"
    cwd: "../architect"
    port: 4002
    shell: true
    env:
      CEREBRO_URL: "http://127.0.0.1:4000"
      ARCHITECT_PORT: "4002"
      CEREBRO_REPORT_ENABLED: "true"

  architect_adk:
    name: "Architect ADK — Sidecar IA"
    command: "python -m uvicorn architect_ai.main:app --host 0.0.0.0 --port 4012"
    cwd: "../architect"
    port: 4012
    shell: true
    env:
      CEREBRO_URL: "http://127.0.0.1:4000"
      ARCHITECT_ADK_PORT: "4012"
      VIRTUAL_ENV: "../architect/.venv"
      PATH: "../architect/.venv/Scripts"
      PYTHONIOENCODING: "utf-8"
