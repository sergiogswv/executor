# ─── Ejecutor — Configuración de Servicios (LINUX) ──────────────────────────────
#
# Cada entrada define un "servicio" que el Ejecutor sabe levantar.
# El Cerebro solo necesita mandar el nombre del servicio (ej: "warden").
# El Ejecutor busca aquí el comando, directorio y variables de entorno.
#
# Campos:
#   name:     Nombre legible del servicio
#   command:  Comando a ejecutar (string o lista de args)
#   cwd:      Directorio de trabajo (absoluto o relativo al ejecutor)
#   env:      Variables de entorno adicionales (opcional)
#   port:     Puerto del servicio (solo informativo, para health checks futuros)
#   shell:    Si ejecutar dentro de un shell (default: false)

services:

  cerebro:
    name: "Cerebro — Orquestador"
    command: "./venv/bin/python3 -m uvicorn app.main:app --host 0.0.0.0 --port 4000"
    cwd: "/home/protec/skrymir-suite/cerebro"
    port: 4000
    shell: true
    env:
      ORCHESTRATOR_MODE: "rest"
      LOG_LEVEL: "INFO"

  warden:
    name: "Warden — Agente de Seguridad"
    command: "./target/release/warden serve"
    cwd: "/home/protec/skrymir-suite/warden"
    port: 4003
    shell: true
    env:
      CEREBRO_URL: "http://127.0.0.1:4000"
      WARDEN_PORT: "4003"
      CEREBRO_REPORT_ENABLED: "true"

  sentinel:
    name: "Sentinel — Agente de Monitoreo"
    command: "./target/release/sentinel serve"
    cwd: "/home/protec/skrymir-suite/sentinel"
    port: 4001
    shell: true
    env:
      CEREBRO_URL: "http://127.0.0.1:4000"
      SENTINEL_PORT: "4001"
      CEREBRO_REPORT_ENABLED: "true"

  architect:
    name: "Architect Linter — Agente de Calidad"
    command: "./target/release/architect-linter-pro serve"
    cwd: "/home/protec/skrymir-suite/architect"
    port: 4002
    shell: true
    env:
      CEREBRO_URL: "http://127.0.0.1:4000"
      ARCHITECT_PORT: "4002"
